version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    environment:
      DATABASE_URL: postgresql://taskflow:${DB_PASSWORD}@postgres:5432/taskflow
      SECRET_KEY: ${SECRET_KEY}
      JWT_EXPIRY_HOURS: 24
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  notifications:
    build: ../services/notifications
    environment:
      DATABASE_URL: postgresql://taskflow:${DB_PASSWORD}@postgres:5432/taskflow
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  analytics:
    build: ../services/analytics
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
